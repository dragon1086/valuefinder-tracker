name: Update ValueFinder Data

on:
  schedule:
    # 3시간마다 실행 (평일 07:00~22:00 KST = UTC 22:00~13:00)
    - cron: "0 22,1,4,7,10,13 * * 1-5"
  workflow_dispatch: # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: python tracker.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/reports.json
          git diff --staged --quiet || (git commit -m "🤖 data: update $(date -u +%Y-%m-%d)" && git pull --rebase origin main && git push)
